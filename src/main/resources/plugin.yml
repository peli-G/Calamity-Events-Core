name: CalamityEventsCore
version: '1.4.0'
main: com.peli.calamityevents.CalamityEventsCore
api-version: '1.21'
author: Peli
description: Permission-gated player data save/restore and queue spawn system for scripted Minecraft events.

softdepend:
  - LuckPerms

commands:
  setqueuespawn:
    description: Sets the queue spawn for the current event world.
    usage: /setqueuespawn
    permission: eventqueue.setqueuespawn
  joinqueue:
    description: Joins the event queue, if it's open and a queue operator is present.
    usage: /joinqueue
  openqueue:
    description: Opens the event queue and grants queue.join.event to the default group.
    usage: /openqueue
    permission: eventqueue.admin
  closequeue:
    description: Closes the event queue and removes queue.join.event from the default group.
    usage: /closequeue
    permission: eventqueue.admin
  queueinfo:
    description: Shows queue status and spawn info.
    usage: /queueinfo
    permission: eventqueue.admin
  calamityeventscore:
    description: Admin command for CalamityEventsCore.
    usage: /calamityeventscore reload
    permission: eventqueue.admin
  setwarp:
    description: Sets a warp at your current location in this world.
    usage: /setwarp <name>
    permission: warp.set
  warp:
    description: Teleports you to a warp in the current world.
    usage: /warp <name>
    permission: warp.use
  delwarp:
    description: Deletes a warp in the current world.
    usage: /delwarp <name>
    permission: warp.delete
  listwarps:
    description: Lists the warps available in the current world.
    usage: /listwarps
    permission: warp.list
  immortal:
    description: Toggles immortal mode for yourself or another player.
    usage: /immortal [player]
    permission: immortal.use

permissions:
  eventqueue.setqueuespawn:
    description: Allows setting the queue spawn location.
    default: op
  eventqueue.admin:
    description: Allows all CalamityEventsCore admin commands.
    default: op
  event.savedata:
    description: >-
      Players with this permission have their data saved on quit and are shown
      the restore GUI on joining an event world or respawning after death.
      Without it, players are treated as actors and reset to the queue spawn.
    default: false
  queue.join.op:
    description: >-
      Marks a player as a queue operator. At least one online queue operator
      must be present in the event world before any other player (without
      this permission) is allowed to enter it. Queue operators also see
      /queueinfo automatically every time they enter the event world.
    default: false
  queue.join.trusted:
    description: >-
      Lets a player join the queue while it's in trusted-only mode (opened
      via "/openqueue trusted"). Has no effect while the queue is fully open
      or fully closed — it only matters during trusted-only mode.
    default: false
  warp.set:
    description: Allows setting warps with /setwarp.
    default: op
  warp.use:
    description: Allows teleporting to warps with /warp.
    default: op
  warp.delete:
    description: Allows deleting warps with /delwarp.
    default: op
  warp.list:
    description: Allows listing warps with /listwarps.
    default: op
  immortal.use:
    description: >-
      Allows toggling immortal mode with /immortal. Immortal players still
      take damage but can never drop below half a heart from normal damage
      — a totem of undying in either hand still pops as usual if it would
      otherwise be a lethal hit.
    default: op
